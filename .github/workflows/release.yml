name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: LocalProxy-${{ github.ref_name }}-linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            artifact: LocalProxy-${{ github.ref_name }}-linux-arm64
          - os: macos-latest
            rid: osx-arm64
            artifact: LocalProxy-${{ github.ref_name }}-osx-arm64
          - os: windows-latest
            rid: win-x64
            artifact: LocalProxy-${{ github.ref_name }}-win-x64.exe
          - os: windows-latest
            rid: win-arm64
            artifact: LocalProxy-${{ github.ref_name }}-win-arm64.exe

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Publish AOT
        run: dotnet publish src/LocalProxy/LocalProxy.csproj -r ${{ matrix.rid }} -c Release --self-contained -p:PublishSingleFile=true -o publish/${{ matrix.rid }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: publish/${{ matrix.rid }}/*

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Package artifacts
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            if [[ "$name" == *win* ]]; then
              (cd "$name" && zip "../${name}.zip" *)
            else
              (cd "$name" && tar czf "../${name}.tar.gz" *)
            fi
          done
          rm -rf */

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
