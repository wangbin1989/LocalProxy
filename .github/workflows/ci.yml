name: CI

on:
  push:
    branches: [main, Plan]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Build core projects
        run: |
          dotnet build src/LocalProxy.Core/LocalProxy.Core.csproj -c Release -warnaserror
          dotnet build src/LocalProxy.Config/LocalProxy.Config.csproj -c Release -warnaserror
          dotnet build src/LocalProxy.Engine/LocalProxy.Engine.csproj -c Release -warnaserror
          dotnet build src/LocalProxy.Ipc/LocalProxy.Ipc.csproj -c Release -warnaserror
          dotnet build src/LocalProxy.Service/LocalProxy.Service.csproj -c Release -warnaserror
          dotnet build src/LocalProxy.Cli/LocalProxy.Cli.csproj -c Release -warnaserror

      - name: Build test projects
        run: |
          dotnet build tests/LocalProxy.Engine.Tests/LocalProxy.Engine.Tests.csproj -c Release
          dotnet build tests/LocalProxy.Config.Tests/LocalProxy.Config.Tests.csproj -c Release

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

  build-maui:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Build MAUI (macCatalyst)
        run: >
          dotnet build
          src/LocalProxy.App/LocalProxy.App.csproj
          -f net10.0-maccatalyst
          -c Release -warnaserror
        continue-on-error: true
