name: CI

on:
  push:
    branches: [main, Plan]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build (core projects)
        run: >
          dotnet build
          -c Release --no-restore -warnaserror
          src/LocalProxy.Core/LocalProxy.Core.csproj
          src/LocalProxy.Config/LocalProxy.Config.csproj
          src/LocalProxy.Engine/LocalProxy.Engine.csproj
          src/LocalProxy.Service/LocalProxy.Service.csproj
          src/LocalProxy.Ipc/LocalProxy.Ipc.csproj
          src/LocalProxy.Cli/LocalProxy.Cli.csproj

      - name: Test
        run: dotnet test -c Release --no-build --verbosity normal

  build-maui:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore
        run: dotnet restore

      - name: Build MAUI (macCatalyst)
        run: >
          dotnet build
          src/LocalProxy.App/LocalProxy.App.csproj
          -f net10.0-maccatalyst
          -c Release
          --no-restore -warnaserror
        continue-on-error: true
